name: Python CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: self-hosted

    env:
      APP_NAME: GitHubActionsDemo
      ENVIRONMENT: DEV

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python
        run: python3 --version

      - name: Run Python Application
        run: python3 app.py

      - name: Run Python Application
        run: python3 app.py
